name: PR Merged

on:
  pull_request:
    types: [closed]

permissions:
  pull-requests: write
  issues: write

jobs:
  merged:
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.user.login != 'HoussemEddineChaouch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🎉 Your PR has been merged @${context.payload.pull_request.user.login}!

            Thank you for contributing to mini-agent-cli — you're now part of the project 🐙

            Feel free to pick up another issue anytime!`
            })
